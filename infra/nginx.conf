events { worker_connections 1024; }

http {
    # This is the "Bouncer" logic
    server {
        listen 80;
        server_name localhost;

        location / {
            # This points to your application network
            # For now, it will just show an Nginx welcome page
            root /usr/share/nginx/html;
            index index.html;
        }

        # Custom Error Page for when the Bouncer blocks someone
        error_page 403 /403.html;
        location = /403.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
