# nginx.conf
events {
    worker_connections 1024;
}

http {
    # Basic security headers
    server_tokens off;
    
    # Define the backend app (we will build this in VLAN 30 next)
    upstream zc_backend {
        server zc-app-v30:3000; # The hostname of your future Node.js/Python container
    }

    server {
        listen 80;
        server_name localhost;

        # Route all web traffic to the backend application
        location / {
            proxy_pass http://zc_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts just in case the backend is slow
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Optional: Add a health check route for the proxy itself
        location /health {
            return 200 "Nginx Proxy is ONLINE\n";
        }
    }
}