# Core Nginx Settings
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Basic Security Headers (Zero Trust Approach)
    server_tokens off; 
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff"; # Prevents MIME-sniffing hacks

    # ENHANCEMENT 1: RATE LIMITING (Anti-DDoS)

    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

    # Gzip compression: befor sending the html, css, js to the user browser the nginx will compress it to make the loading faster and save bandwidth

    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1000;

    # THE UPSTREAM SERVERS

    upstream nestjs_backend {
        server zc-app-v30:3000; 
    }

    upstream nextjs_frontend {
        server zc-frontend-v20:3000; # The frontend we are about to build!
    }

    server {
        listen 80;
        server_name localhost;

        # Apply the Rate Limit to the whole server (allows short bursts)
        limit_req zone=mylimit burst=20 nodelay;

        # WAF Placeholder (ModSecurity)
        # modsecurity on;
        # modsecurity_rules_file /etc/nginx/modsec/main.conf;


        # Making a smart routing        
        # Any request starting with /api/ goes to the NestJS Backend
        location /api/ {
            proxy_pass http://nestjs_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # All other standard traffic goes to the Next.js Frontend
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}