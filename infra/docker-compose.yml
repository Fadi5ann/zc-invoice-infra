services:
# Management Layer
  jump-server:
    image: alpine:latest
    container_name: zc-jump-server-v100
    command: tail -f /dev/null
    networks:
      - mgmt_net
      - dmz_net
      - frontend_net
      - backend_net
      - db_net

# The "Librarian" - Data collection
  prometheus:
    image: prom/prometheus:latest
    container_name: zc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mgmt_net
      - dmz_net
      - frontend_net
      - backend_net
      - db_net

# The Dashboard - Displays Graphs
  grafana:
    image: grafana/grafana:latest
    container_name: zc-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - mgmt_net

  # The "Security Camera" - Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: zc-cadvisor
    privileged: true # <-- The VIP Pass
    pid: "host" # <-- Access to Host's Process Tree
    cgroup: "host" # <-- Access to Host's Cgroup Metrics
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro # <-- Reads the Container Names
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /sys/fs/cgroup:/cgroup:ro # <-- Reads modern Ubuntu metrics
    networks:
      - mgmt_net

# The Log Database
  loki:
    image: grafana/loki:latest
    container_name: zc-loki
    ports:
      - "3100:3100"
    networks:
      - mgmt_net

# The Log Reader
  promtail:
    image: grafana/promtail:latest
    container_name: zc-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - mgmt_net

# --- WEB LAYER ---
# Web/DMZ Layer (The Bouncer)
  web-entry:
    image: nginx:alpine
    container_name: zc-proxy-v10
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dmz_net
      - frontend_net
      - backend_net

# Database Layer
  db-primary:
    image: mysql:8.0
    container_name: zc-db-master-v40
    command: ["mysqld", "--server-id=1"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql-config/my.cnf:/etc/mysql/my.cnf
    networks:
      db_net:
        ipv4_address: 10.0.3.11

  db-secondary-1:
    image: mysql:8.0
    container_name: zc-db-replica-v40
    command: ["mysqld", "--server-id=2"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql-config/my.cnf:/etc/mysql/my.cnf
    networks:
      db_net:
        ipv4_address: 10.0.3.12

  db-secondary-2:
    image: mysql:8.0
    container_name: zc-db-replica2-v40
    command: ["mysqld", "--server-id=3"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql-config/my.cnf:/etc/mysql/my.cnf
    networks:
      db_net:
        ipv4_address: 10.0.3.13

  # Backup Layer
  backup-manager:
    image: mysql:8.0
    container_name: zc-backup-v200
    command: tail -f /dev/null
    volumes:
      - ./backups:/backup-vault
    networks:
      backup_net:
        ipv4_address: 10.0.200.50
      db_net:
        ipv4_address: 10.0.3.50

networks:
  # Vlan 10: Public Entry Point
  dmz_net:
    driver: bridge
    labels:
      com.zc-invoice.vlan: "10"
    ipam:
      config:
        - subnet: 10.0.0.0/24

  # Vlan 20: User Interface
  frontend_net:
    driver: bridge
    labels:
      com.zc-invoice.vlan: "20"
    ipam:
      config:
        - subnet: 10.0.1.0/24

  # Vlan 30: Business Logic
  backend_net:
    driver: bridge
    labels:
      com.zc-invoice.vlan: "30"
    ipam:
      config:
        - subnet: 10.0.2.0/24

  # Vlan 40: Data Storage
  db_net:
    driver: bridge
    labels:
      com.zc-invoice.vlan: "40"
    ipam:
      config:
        - subnet: 10.0.3.0/24

  # Vlan 100: Adiministration
  mgmt_net:
    driver: bridge
    labels:
      com.zc-invoice.vlan: "100"
    ipam:
      config:
        - subnet: 10.0.100.0/24

  # Vlan 200: Data Recovery
  backup_net:
    driver: bridge
    labels:
      com.zc-invoice.vlan: "200"
    ipam:
      config:
      - subnet: 10.0.200.0/24
